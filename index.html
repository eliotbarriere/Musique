<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D.Joke</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080810;
      --surface: #0e0e1a;
      --surface2: #13131f;
      --border: rgba(255,255,255,0.06);
      --border-bright: rgba(255,255,255,0.12);
      --text: #f0eeff;
      --muted: rgba(240,238,255,0.45);
      --subtle: rgba(240,238,255,0.2);
      --neon-a: #b06fff;
      --neon-b: #ff3cac;
      --neon-c: #00f5d4;
      --glow-a: rgba(176,111,255,0.35);
      --glow-b: rgba(255,60,172,0.35);
      --glow-c: rgba(0,245,212,0.3);
      --player-h: 100px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.18;
    }
    .blob-a { width: 500px; height: 500px; background: var(--neon-a); top: -180px; left: -100px; }
    .blob-b { width: 400px; height: 400px; background: var(--neon-b); bottom: 80px; right: -120px; }
    .blob-c { width: 300px; height: 300px; background: var(--neon-c); top: 40%; left: 55%; }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8,8,16,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      text-shadow: 0 0 20px var(--neon-a), 0 0 40px var(--glow-a);
    }
    .logo em {
      font-style: italic;
      font-weight: 400;
      color: var(--neon-a);
    }

    nav { display: flex; gap: 4px; }
    nav a {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid transparent;
      transition: all 0.2s;
      cursor: pointer;
      letter-spacing: 0.04em;
    }
    nav a:hover { color: var(--text); border-color: var(--border-bright); }
    nav a.active {
      color: var(--neon-a);
      border-color: rgba(176,111,255,0.4);
      background: rgba(176,111,255,0.08);
      text-shadow: 0 0 12px var(--glow-a);
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 700px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem calc(var(--player-h) + 2rem);
    }

    .section { margin-bottom: 3rem; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.2rem;
    }
    .section-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--border-bright), transparent);
    }
    .section-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .section-count {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--subtle);
    }

    .track-list { display: flex; flex-direction: column; gap: 2px; }

    .track {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.18s;
      background: transparent;
    }
    .track:hover { background: var(--surface); border-color: var(--border); }
    .track.playing {
      background: var(--surface2);
      border-color: rgba(176,111,255,0.25);
      box-shadow: inset 0 0 24px rgba(176,111,255,0.04), 0 0 0 1px rgba(176,111,255,0.08);
    }

    .track-index {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--subtle);
      width: 22px;
      text-align: right;
      flex-shrink: 0;
    }
    .track.playing .track-index { display: none; }
    .track-play-icon {
      display: none;
      width: 22px;
      flex-shrink: 0;
      color: var(--neon-a);
      filter: drop-shadow(0 0 6px var(--neon-a));
    }
    .track.playing .track-play-icon { display: flex; align-items: center; }

    .track-info { flex: 1; min-width: 0; }
    .track-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track.playing .track-name { color: #fff; }

    .track-tags { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
    .tag {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.06em;
      padding: 2px 8px;
      border-radius: 99px;
      border: 1px solid var(--border-bright);
      color: var(--muted);
    }
    .track.playing .tag {
      border-color: rgba(176,111,255,0.3);
      color: rgba(176,111,255,0.8);
    }

    .track-duration {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--subtle);
      flex-shrink: 0;
    }

    .bars {
      display: none;
      align-items: flex-end;
      gap: 2px;
      height: 14px;
      flex-shrink: 0;
    }
    .track.playing .bars { display: flex; }
    .bar {
      width: 3px;
      border-radius: 2px;
      background: var(--neon-a);
      box-shadow: 0 0 5px var(--neon-a);
      animation: bounce 0.8s ease-in-out infinite alternate;
      transform-origin: bottom;
    }
    .bar:nth-child(1) { height: 6px;  animation-delay: 0s;    animation-duration: 0.7s; }
    .bar:nth-child(2) { height: 10px; animation-delay: 0.15s; animation-duration: 0.9s; }
    .bar:nth-child(3) { height: 14px; animation-delay: 0.05s; animation-duration: 0.6s; }
    .bar:nth-child(4) { height: 8px;  animation-delay: 0.25s; animation-duration: 1.0s; }
    .bar:nth-child(5) { height: 12px; animation-delay: 0.1s;  animation-duration: 0.75s;}
    @keyframes bounce {
      from { transform: scaleY(0.3); }
      to   { transform: scaleY(1); }
    }
    .paused .bar { animation-play-state: paused; }

    .player {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      background: rgba(10,10,18,0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid var(--border-bright);
      height: var(--player-h);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 2rem;
    }
    .player::before {
      content: '';
      position: absolute;
      top: -1px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--neon-a), var(--neon-b), var(--neon-c), transparent);
      opacity: 0.7;
    }

    .player-inner {
      max-width: 700px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .player-top {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .player-info { flex: 1; min-width: 0; }
    .player-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-meta {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-top: 3px;
      letter-spacing: 0.04em;
    }

    .player-controls { display: flex; align-items: center; gap: 6px; }
    .ctrl {
      background: none;
      border: 1px solid transparent;
      cursor: pointer;
      padding: 7px;
      color: var(--muted);
      border-radius: 8px;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ctrl:hover { color: var(--text); border-color: var(--border-bright); background: var(--surface); }
    .ctrl.main {
      color: var(--neon-a);
      border-color: rgba(176,111,255,0.35);
      background: rgba(176,111,255,0.08);
      box-shadow: 0 0 14px var(--glow-a), inset 0 0 10px rgba(176,111,255,0.06);
    }
    .ctrl.main:hover { background: rgba(176,111,255,0.15); box-shadow: 0 0 22px var(--glow-a); }

    .progress-row { display: flex; align-items: center; gap: 10px; }
    .time {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--subtle);
      min-width: 34px;
    }
    .time.end { text-align: right; }

    .progress-bar {
      flex: 1;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      cursor: pointer;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      border-radius: 99px;
      width: 0%;
      background: linear-gradient(to right, var(--neon-a), var(--neon-b));
      box-shadow: 0 0 8px var(--neon-a);
      transition: width 0.25s linear;
      pointer-events: none;
    }

    .empty {
      padding: 2.5rem 0;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--subtle);
      text-align: center;
      letter-spacing: 0.06em;
    }

    @media (max-width: 520px) {
      header { padding: 0 1rem; }
      main { padding: 1.5rem 1rem calc(var(--player-h) + 1.5rem); }
      .player { padding: 0 1rem; }
      nav a { font-size: 10px; padding: 5px 10px; }
    }
  </style>
</head>
<body>

<div class="blob blob-a"></div>
<div class="blob blob-b"></div>
<div class="blob blob-c"></div>

<header>
  <div class="logo">D<em>.Joke</em></div>
  <nav>
    <a class="active" onclick="showSection('mashups', this)">Mashups</a>
    <a onclick="showSection('transitions', this)">Transitions</a>
    <a onclick="showSection('sets', this)">Sets</a>
  </nav>
</header>

<main>
  <section id="mashups" class="section">
    <div class="section-header">
      <span class="section-label">Mashups</span>
      <span class="section-count" id="mashups-count"></span>
      <div class="section-line"></div>
    </div>
    <div class="track-list" id="mashups-list"></div>
  </section>

  <section id="transitions" class="section" style="display:none">
    <div class="section-header">
      <span class="section-label">Transitions</span>
      <span class="section-count" id="transitions-count"></span>
      <div class="section-line"></div>
    </div>
    <div class="track-list" id="transitions-list"></div>
  </section>

  <section id="sets" class="section" style="display:none">
    <div class="section-header">
      <span class="section-label">Sets</span>
      <span class="section-count" id="sets-count"></span>
      <div class="section-line"></div>
    </div>
    <div class="track-list" id="sets-list"></div>
  </section>
</main>

<div class="player">
  <div class="player-inner">
    <div class="player-top">
      <div class="player-info">
        <div class="player-title" id="player-title">Aucun morceau sélectionné</div>
        <div class="player-meta" id="player-meta">—</div>
      </div>
      <div class="player-controls">
        <button class="ctrl" onclick="prevTrack()" title="Précédent">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/>
          </svg>
        </button>
        <button class="ctrl main" id="play-btn" onclick="togglePlay()" title="Lecture / Pause">
          <svg id="play-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          <svg id="pause-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="display:none">
            <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
          </svg>
        </button>
        <button class="ctrl" onclick="nextTrack()" title="Suivant">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="progress-row">
      <span class="time" id="time-cur">0:00</span>
      <div class="progress-bar" id="progress-bar" onclick="seek(event)">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <span class="time end" id="time-end">0:00</span>
    </div>
  </div>
</div>

<audio id="audio"></audio>

<script>
  // =====================================================
  // 🎵 CATALOGUE — modifie ici pour ajouter tes sons
  // =====================================================
  // src : lien Google Drive → voir README en bas du fichier
  // =====================================================
  const catalogue = {
    mashups: [
      { name: "lolibamba",  tags: ["rap", "techno"],      duration: "3:42",  src: "https://archive.org/details/lolibamba" },
      { name: "Drake × Stromae",        tags: ["Hip-Hop", "Électro"],duration: "4:10",  src: "https://drive.google.com/uc?export=download&id=TON_ID_ICI" },
      { name: "Kendrick × Justice",     tags: ["Rap", "Rock"],       duration: "2:58",  src: "https://drive.google.com/uc?export=download&id=TON_ID_ICI" }
    ],
    transitions: [
      { name: "Billie Eilish → The Weeknd", tags: ["Pop"],           duration: "1:12",  src: "https://drive.google.com/uc?export=download&id=TON_ID_ICI" },
      { name: "Rosalía → Bad Bunny",        tags: ["Reggaeton"],     duration: "0:58",  src: "https://drive.google.com/uc?export=download&id=TON_ID_ICI" }
    ],
    sets: [
      { name: "Summer Mix 2024", tags: ["House", "Disco"],           duration: "48:22", src: "https://drive.google.com/uc?export=download&id=TON_ID_ICI" }
    ]
  };


  const audio = document.getElementById('audio');
  let currentSection = 'mashups';
  let flatList = [];
  let currentIdx = -1;
  let isPlaying = false;

  function buildFlatList() {
    flatList = catalogue[currentSection].map((t, i) => ({ ...t, section: currentSection, idx: i }));
  }

  function renderSection(key) {
    const list = catalogue[key];
    const container = document.getElementById(key + '-list');
    const count = document.getElementById(key + '-count');
    count.textContent = list.length + ' titre' + (list.length > 1 ? 's' : '');
    if (!list.length) {
      container.innerHTML = '<div class="empty">// aucun morceau pour l\'instant</div>';
      return;
    }
    container.innerHTML = list.map((t, i) => `
      <div class="track" id="track-${key}-${i}" onclick="playTrack('${key}', ${i})">
        <span class="track-index">${String(i + 1).padStart(2, '0')}</span>
        <span class="track-play-icon">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </span>
        <div class="track-info">
          <div class="track-name">${t.name}</div>
          <div class="track-tags">${t.tags.map(g => `<span class="tag">${g}</span>`).join('')}</div>
        </div>
        <div class="bars">
          <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
        <span class="track-duration">${t.duration}</span>
      </div>
    `).join('');
  }

  function showSection(key, el) {
    ['mashups', 'transitions', 'sets'].forEach(k => {
      document.getElementById(k).style.display = k === key ? '' : 'none';
    });
    document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
    el.classList.add('active');
    currentSection = key;
    buildFlatList();
  }

  function playTrack(section, idx) {
    document.querySelectorAll('.track').forEach(t => t.classList.remove('playing', 'paused'));
    const el = document.getElementById('track-' + section + '-' + idx);
    if (el) el.classList.add('playing');
    if (currentSection !== section) { currentSection = section; buildFlatList(); }
    currentIdx = idx;
    const track = catalogue[section][idx];
    document.getElementById('player-title').textContent = track.name;
    document.getElementById('player-meta').textContent = track.tags.join(' · ') + ' · ' + track.duration;
    document.getElementById('time-end').textContent = track.duration;
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('time-cur').textContent = '0:00';
    audio.src = track.src;
    audio.play().then(() => setPlaying(true)).catch(() => setPlaying(false));
  }

  function setPlaying(state) {
    isPlaying = state;
    document.getElementById('play-icon').style.display = state ? 'none' : '';
    document.getElementById('pause-icon').style.display = state ? '' : 'none';
    const playing = document.querySelector('.track.playing');
    if (playing) {
      if (state) playing.classList.remove('paused');
      else playing.classList.add('paused');
    }
  }

  function togglePlay() {
    if (!audio.src || audio.src.includes('TON_ID_ICI')) return;
    if (isPlaying) { audio.pause(); setPlaying(false); }
    else { audio.play(); setPlaying(true); }
  }

  function prevTrack() { if (currentIdx > 0) playTrack(currentSection, currentIdx - 1); }
  function nextTrack() { if (currentIdx < flatList.length - 1) playTrack(currentSection, currentIdx + 1); }

  function seek(e) {
    if (!audio.duration) return;
    const bar = document.getElementById('progress-bar');
    audio.currentTime = (e.offsetX / bar.offsetWidth) * audio.duration;
  }

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    document.getElementById('progress-fill').style.width = (audio.currentTime / audio.duration * 100) + '%';
    document.getElementById('time-cur').textContent = fmt(audio.currentTime);
  });

  audio.addEventListener('ended', () => { setPlaying(false); nextTrack(); });

  function fmt(s) {
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  buildFlatList();
  ['mashups', 'transitions', 'sets'].forEach(renderSection);
</script>

<!--
  =====================================================
  📁 GOOGLE DRIVE — lien audio direct
  =====================================================
  1. Upload le fichier audio sur Google Drive
  2. Clic droit > Obtenir le lien > "Tout le monde avec le lien"
  3. Copie l'ID dans l'URL :
     https://drive.google.com/file/d/[ID_ICI]/view
  4. Remplace TON_ID_ICI dans le catalogue par cet ID

  Lien final : https://drive.google.com/uc?export=download&id=ID_ICI

  =====================================================
  🚀 GITHUB PAGES
  =====================================================
  1. Repo GitHub > upload index.html a la racine
  2. Settings > Pages > Source: main / root
  3. Dispo sur : https://[pseudo].github.io/[repo]/
  =====================================================
-->
</body>
</html>
